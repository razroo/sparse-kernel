openapi: 3.1.0
info:
  title: SparseKernel Local API
  version: 0.1.0
  description: Local JSON API for the SparseKernel daemon.
servers:
  - url: http://127.0.0.1:8765
paths:
  /health:
    get:
      operationId: health
      responses:
        "200":
          description: Daemon health
          content:
            application/json:
              schema:
                type: object
                required: [ok, service, version]
                properties:
                  ok: { type: boolean }
                  service: { type: string }
                  version: { type: string }
  /status:
    get:
      operationId: status
      responses:
        "200":
          description: Runtime ledger status
          content:
            application/json:
              schema:
                type: object
                required: [path, schema_version, counts]
                properties:
                  path: { type: string }
                  schema_version: { type: integer }
                  counts:
                    type: object
                    additionalProperties: { type: integer }
  /tasks:
    get:
      operationId: listTasks
      responses:
        "200":
          description: Recent tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
  /sessions:
    get:
      operationId: listSessions
      responses:
        "200":
          description: Recent sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Session"
  /sessions/upsert:
    post:
      operationId: upsertSession
      description: Create or update a session ledger row for an agent before recording session-scoped work.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertSessionInput"
      responses:
        "200":
          description: Upserted session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
  /transcript-events/append:
    post:
      operationId: appendTranscriptEvent
      description: Append a session transcript event with kernel-assigned per-session sequence ordering.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppendTranscriptEventInput"
      responses:
        "200":
          description: Appended transcript event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TranscriptEvent"
  /transcript-events/list:
    post:
      operationId: listTranscriptEvents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [session_id]
              properties:
                session_id: { type: string }
                limit: { type: integer }
      responses:
        "200":
          description: Session transcript events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TranscriptEvent"
  /tasks/enqueue:
    post:
      operationId: enqueueTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnqueueTaskInput"
      responses:
        "200":
          description: Enqueued task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
  /tasks/claim:
    post:
      operationId: claimTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClaimTaskInput"
      responses:
        "200":
          description: Claimed task or null when none are available
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: "#/components/schemas/Task"
                  - type: "null"
  /tasks/claim-id:
    post:
      operationId: claimTaskById
      description: Atomically claim a specific queued task by id.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClaimTaskByIdInput"
      responses:
        "200":
          description: Claimed task or null when the task is not queued
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: "#/components/schemas/Task"
                  - type: "null"
  /tasks/heartbeat:
    post:
      operationId: heartbeatTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HeartbeatTaskInput"
      responses:
        "200":
          description: Heartbeat result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BooleanResult"
  /tasks/complete:
    post:
      operationId: completeTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteTaskInput"
      responses:
        "200":
          description: Completion result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BooleanResult"
  /tasks/fail:
    post:
      operationId: failTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FailTaskInput"
      responses:
        "200":
          description: Failure transition result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BooleanResult"
  /tool-calls:
    get:
      operationId: listToolCalls
      responses:
        "200":
          description: Recent tool calls
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ToolCall"
  /tool-calls/create:
    post:
      operationId: createToolCall
      description: Create a brokered tool call after capability-checking tool invocation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateToolCallInput"
      responses:
        "200":
          description: Created tool call
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolCall"
  /tool-calls/start:
    post:
      operationId: startToolCall
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ToolCallIdInput"
      responses:
        "200":
          description: Started tool call
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolCall"
  /tool-calls/complete:
    post:
      operationId: completeToolCall
      description: Complete a running tool call and record output artifact ids in the ledger.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteToolCallInput"
      responses:
        "200":
          description: Completed tool call
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolCall"
  /tool-calls/fail:
    post:
      operationId: failToolCall
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FailToolCallInput"
      responses:
        "200":
          description: Failed tool call
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolCall"
  /browser/contexts:
    get:
      operationId: listBrowserContexts
      responses:
        "200":
          description: Browser contexts known to the broker
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BrowserContext"
  /browser/pools:
    get:
      operationId: listBrowserPools
      responses:
        "200":
          description: Browser pools known to the broker
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BrowserPool"
  /browser/pools/probe:
    post:
      operationId: probeBrowserPool
      description: Probe a loopback-only CDP endpoint with `/json/version` without exposing raw CDP to agents.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProbeBrowserPoolInput"
      responses:
        "200":
          description: CDP endpoint probe result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrowserEndpointProbe"
  /browser/contexts/acquire:
    post:
      operationId: acquireBrowserContext
      description: Acquire a v0 browser context lease from a trust-zone-keyed pool. A loopback CDP endpoint may be registered for the pool, but raw CDP is not returned to agents.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcquireBrowserContextInput"
      responses:
        "200":
          description: Acquired browser context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrowserContext"
  /browser/contexts/release:
    post:
      operationId: releaseBrowserContext
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [context_id]
              properties:
                context_id: { type: string }
      responses:
        "200":
          description: Release result
          content:
            application/json:
              schema:
                type: object
                required: [released]
                properties:
                  released: { type: boolean }
  /sandbox/allocate:
    post:
      operationId: allocateSandbox
      description: Allocate a sandbox lease for a trust zone. The v0 local/no-isolation backend is accounting only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AllocateSandboxInput"
      responses:
        "200":
          description: Sandbox allocation lease
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SandboxAllocation"
  /sandbox/release:
    post:
      operationId: releaseSandbox
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [allocation_id]
              properties:
                allocation_id: { type: string }
      responses:
        "200":
          description: Release result
          content:
            application/json:
              schema:
                type: object
                required: [released]
                properties:
                  released: { type: boolean }
  /leases/release-expired:
    post:
      operationId: releaseExpiredLeases
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                now: { type: string }
      responses:
        "200":
          description: Expired lease release counts
          content:
            application/json:
              schema:
                type: object
                required: [tasks, resources]
                properties:
                  tasks: { type: integer }
                  resources: { type: integer }
  /capabilities/grant:
    post:
      operationId: grantCapability
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GrantCapabilityInput"
      responses:
        "200":
          description: Granted capability
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Capability"
  /capabilities/check:
    post:
      operationId: checkCapability
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CapabilityCheckInput"
      responses:
        "200":
          description: Capability decision
          content:
            application/json:
              schema:
                type: object
                required: [allowed]
                properties:
                  allowed: { type: boolean }
  /capabilities/revoke:
    post:
      operationId: revokeCapability
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id: { type: string }
      responses:
        "200":
          description: Revoke result
          content:
            application/json:
              schema:
                type: object
                required: [revoked]
                properties:
                  revoked: { type: boolean }
  /capabilities/list:
    post:
      operationId: listCapabilities
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subject_type, subject_id]
              properties:
                subject_type: { type: string }
                subject_id: { type: string }
      responses:
        "200":
          description: Subject capabilities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Capability"
  /artifacts/create:
    post:
      operationId: createArtifact
      description: Store artifact bytes outside SQLite and record artifact metadata in the ledger.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateArtifactInput"
      responses:
        "200":
          description: Created or deduplicated artifact metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Artifact"
  /artifacts/read:
    post:
      operationId: readArtifact
      description: Read artifact bytes as base64 after capability and artifact-access checks.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArtifactAccessInput"
      responses:
        "200":
          description: Artifact metadata and base64 content
          content:
            application/json:
              schema:
                type: object
                required: [artifact, content_base64]
                properties:
                  artifact:
                    $ref: "#/components/schemas/Artifact"
                  content_base64: { type: string }
  /artifacts/metadata:
    post:
      operationId: artifactMetadata
      description: Read artifact metadata after capability and artifact-access checks when a subject is supplied.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArtifactAccessInput"
      responses:
        "200":
          description: Artifact metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Artifact"
  /audit:
    get:
      operationId: listAudit
      responses:
        "200":
          description: Recent audit events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditEvent"
components:
  schemas:
    Task:
      type: object
      required: [id, kind, priority, status, attempts, created_at, updated_at]
      properties:
        id: { type: string }
        agent_id: { type: [string, "null"] }
        session_id: { type: [string, "null"] }
        kind: { type: string }
        priority: { type: integer }
        status:
          type: string
          enum: [queued, running, completed, failed, cancelled]
        lease_owner: { type: [string, "null"] }
        lease_until: { type: [string, "null"] }
        attempts: { type: integer }
        result_artifact_id: { type: [string, "null"] }
        created_at: { type: string }
        updated_at: { type: string }
    EnqueueTaskInput:
      type: object
      required: [kind]
      properties:
        id: { type: string }
        agent_id: { type: [string, "null"] }
        session_id: { type: [string, "null"] }
        kind: { type: string }
        priority: { type: integer, default: 0 }
        idempotency_key: { type: [string, "null"] }
        input: true
    ClaimTaskInput:
      type: object
      required: [worker_id]
      properties:
        worker_id: { type: string }
        kinds:
          type: array
          items: { type: string }
        lease_seconds: { type: integer }
    ClaimTaskByIdInput:
      type: object
      required: [task_id, worker_id]
      properties:
        task_id: { type: string }
        worker_id: { type: string }
        lease_seconds: { type: integer }
    HeartbeatTaskInput:
      type: object
      required: [task_id, worker_id]
      properties:
        task_id: { type: string }
        worker_id: { type: string }
        lease_seconds: { type: integer }
    CompleteTaskInput:
      type: object
      required: [task_id, worker_id]
      properties:
        task_id: { type: string }
        worker_id: { type: string }
        result_artifact_id: { type: [string, "null"] }
    FailTaskInput:
      type: object
      required: [task_id, worker_id, error]
      properties:
        task_id: { type: string }
        worker_id: { type: string }
        error: { type: string }
    BooleanResult:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean }
    Session:
      type: object
      required: [id, agent_id, status, current_token_count, created_at, updated_at]
      properties:
        id: { type: string }
        agent_id: { type: string }
        session_key: { type: [string, "null"] }
        channel: { type: [string, "null"] }
        status: { type: string }
        current_token_count: { type: integer }
        last_activity_at: { type: [string, "null"] }
        created_at: { type: string }
        updated_at: { type: string }
    UpsertSessionInput:
      type: object
      required: [id, agent_id]
      properties:
        id: { type: string }
        agent_id: { type: string }
        session_key: { type: [string, "null"] }
        channel: { type: [string, "null"] }
        status: { type: [string, "null"] }
        current_token_count: { type: [integer, "null"] }
        last_activity_at: { type: [string, "null"] }
    TranscriptEvent:
      type: object
      required: [id, session_id, seq, role, event_type, created_at]
      properties:
        id: { type: integer }
        session_id: { type: string }
        parent_event_id: { type: [integer, "null"] }
        seq: { type: integer }
        role: { type: string }
        event_type: { type: string }
        content: true
        tool_call_id: { type: [string, "null"] }
        token_count: { type: [integer, "null"] }
        created_at: { type: string }
    AppendTranscriptEventInput:
      type: object
      required: [session_id, role, event_type]
      properties:
        session_id: { type: string }
        parent_event_id: { type: [integer, "null"] }
        role: { type: string }
        event_type: { type: string }
        content: true
        tool_call_id: { type: [string, "null"] }
        token_count: { type: [integer, "null"] }
        created_at: { type: [string, "null"] }
    ToolCall:
      type: object
      required: [id, tool_name, status, created_at]
      properties:
        id: { type: string }
        task_id: { type: [string, "null"] }
        session_id: { type: [string, "null"] }
        agent_id: { type: [string, "null"] }
        tool_name: { type: string }
        status:
          type: string
          enum: [created, running, completed, failed]
        input: true
        output: true
        error: { type: [string, "null"] }
        started_at: { type: [string, "null"] }
        ended_at: { type: [string, "null"] }
        created_at: { type: string }
    CreateToolCallInput:
      type: object
      required: [tool_name]
      properties:
        id: { type: string }
        task_id: { type: [string, "null"] }
        session_id: { type: [string, "null"] }
        agent_id: { type: [string, "null"] }
        tool_name: { type: string }
        input: true
    ToolCallIdInput:
      type: object
      required: [id]
      properties:
        id: { type: string }
    CompleteToolCallInput:
      type: object
      required: [id]
      properties:
        id: { type: string }
        output: true
        artifact_ids:
          type: array
          items: { type: string }
    FailToolCallInput:
      type: object
      required: [id, error]
      properties:
        id: { type: string }
        error: { type: string }
    BrowserContext:
      type: object
      required: [id, pool_id, profile_mode, status, created_at]
      properties:
        id: { type: string }
        pool_id: { type: string }
        agent_id: { type: [string, "null"] }
        session_id: { type: [string, "null"] }
        task_id: { type: [string, "null"] }
        profile_mode: { type: string }
        status: { type: string }
        created_at: { type: string }
    BrowserPool:
      type: object
      required: [id, trust_zone_id, browser_kind, status, max_contexts, created_at, updated_at]
      properties:
        id: { type: string }
        trust_zone_id: { type: string }
        browser_kind: { type: string }
        status: { type: string }
        max_contexts: { type: integer }
        cdp_endpoint: { type: [string, "null"] }
        created_at: { type: string }
        updated_at: { type: string }
    BrowserEndpointProbe:
      type: object
      required: [endpoint, reachable]
      properties:
        endpoint: { type: string }
        reachable: { type: boolean }
        status_code: { type: [integer, "null"] }
        browser: { type: [string, "null"] }
        web_socket_debugger_url: { type: [string, "null"] }
        error: { type: [string, "null"] }
    ProbeBrowserPoolInput:
      type: object
      required: [cdp_endpoint]
      properties:
        cdp_endpoint:
          type: string
          description: Loopback `http://` CDP endpoint, for example `http://127.0.0.1:9222`.
    AcquireBrowserContextInput:
      type: object
      required: [trust_zone_id]
      properties:
        agent_id: { type: [string, "null"] }
        session_id: { type: [string, "null"] }
        task_id: { type: [string, "null"] }
        trust_zone_id: { type: string }
        max_contexts: { type: integer }
        cdp_endpoint: { type: [string, "null"] }
    SandboxAllocation:
      type: object
      required: [id, trust_zone_id, backend, status, created_at]
      properties:
        id: { type: string }
        task_id: { type: [string, "null"] }
        trust_zone_id: { type: string }
        backend: { type: string }
        status: { type: string }
        created_at: { type: string }
    AllocateSandboxInput:
      type: object
      required: [trust_zone_id]
      properties:
        agent_id: { type: [string, "null"] }
        task_id: { type: [string, "null"] }
        trust_zone_id: { type: string }
        backend: { type: [string, "null"] }
    Capability:
      type: object
      required: [id, subject_type, subject_id, resource_type, action, created_at]
      properties:
        id: { type: string }
        subject_type: { type: string }
        subject_id: { type: string }
        resource_type: { type: string }
        resource_id: { type: [string, "null"] }
        action: { type: string }
        constraints: true
        expires_at: { type: [string, "null"] }
        created_at: { type: string }
    GrantCapabilityInput:
      type: object
      required: [subject_type, subject_id, resource_type, action]
      properties:
        subject_type: { type: string }
        subject_id: { type: string }
        resource_type: { type: string }
        resource_id: { type: [string, "null"] }
        action: { type: string }
        constraints: true
        expires_at: { type: [string, "null"] }
    CapabilityCheckInput:
      type: object
      required: [subject_type, subject_id, resource_type, action]
      properties:
        subject_type: { type: string }
        subject_id: { type: string }
        resource_type: { type: string }
        resource_id: { type: [string, "null"] }
        action: { type: string }
        context: true
        audit_denied: { type: boolean }
    Artifact:
      type: object
      required: [id, sha256, size_bytes, storage_ref, created_at]
      properties:
        id: { type: string }
        sha256: { type: string }
        mime_type: { type: [string, "null"] }
        size_bytes: { type: integer }
        storage_ref: { type: string }
        classification: { type: [string, "null"] }
        retention_policy: { type: [string, "null"] }
        created_at: { type: string }
    ArtifactSubject:
      type: object
      required: [subject_type, subject_id]
      properties:
        subject_type: { type: string }
        subject_id: { type: string }
        permission: { type: [string, "null"] }
    CreateArtifactInput:
      type: object
      properties:
        content_base64: { type: string }
        content_text: { type: string }
        mime_type: { type: [string, "null"] }
        retention_policy:
          type: [string, "null"]
          enum: [ephemeral, session, durable, debug, null]
        subject:
          $ref: "#/components/schemas/ArtifactSubject"
      anyOf:
        - required: [content_base64]
        - required: [content_text]
    ArtifactAccessInput:
      type: object
      required: [id]
      properties:
        id: { type: string }
        subject:
          $ref: "#/components/schemas/ArtifactSubject"
    AuditEvent:
      type: object
      required: [id, action, created_at]
      properties:
        id: { type: integer }
        actor_type: { type: [string, "null"] }
        actor_id: { type: [string, "null"] }
        action: { type: string }
        object_type: { type: [string, "null"] }
        object_id: { type: [string, "null"] }
        payload: true
